name: release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PyYAML
        run: pip install pyyaml==6.0.2

      - name: Verify tag matches plugin.yaml version
        run: |
          set -e
          TAG="${GITHUB_REF_NAME#v}"
          YAML_VERSION=$(python -c "import yaml; print(yaml.safe_load(open('plugin.yaml'))['version'])")
          PYPROJECT_VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          echo "tag=$TAG plugin.yaml=$YAML_VERSION pyproject.toml=$PYPROJECT_VERSION"
          if [ "$TAG" != "$YAML_VERSION" ]; then
            echo "::error::Tag $TAG does not match plugin.yaml version $YAML_VERSION"
            exit 1
          fi
          if [ "$TAG" != "$PYPROJECT_VERSION" ]; then
            echo "::error::Tag $TAG does not match pyproject.toml version $PYPROJECT_VERSION"
            exit 1
          fi

      - name: Generate release notes from recent commits
        id: notes
        run: |
          set -e
          PREV_TAG=$(git tag --list 'v*' --sort=-v:refname | sed -n 2p)
          if [ -n "$PREV_TAG" ]; then
            RANGE="$PREV_TAG..${GITHUB_REF_NAME}"
            echo "Generating notes for $RANGE"
          else
            RANGE="${GITHUB_REF_NAME}"
            echo "First release; generating notes from full history."
          fi
          {
            echo "## What's in ${GITHUB_REF_NAME}"
            echo ""
            git log $RANGE --pretty=format:"- %s" --no-merges
            echo ""
            echo ""
            echo "## Install"
            echo ""
            echo '```bash'
            echo "hermes plugins install that-ambuj/hermes-claude-auth --enable"
            echo '```'
            echo ""
            echo "See [README](https://github.com/that-ambuj/hermes-claude-auth#readme) for full docs."
          } > release-notes.md
          echo "notes_path=release-notes.md" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --title "${GITHUB_REF_NAME}" \
            --notes-file "${{ steps.notes.outputs.notes_path }}" \
            --verify-tag
